# build and push images to ghcr (fork: Deathnerd/job-ops)
# - every push to main -> ghcr.io/deathnerd/job-ops:main + :sha-<short>
# - version tags (v*)  -> :<tag> + :latest
# amd64 only: the homelab k3s node is x86_64 and QEMU arm64 builds of this
# image (playwright + codex toolchain) multiply CI time for no consumer.
name: build-and-push-ghcr

on:
  push:
    branches: ["main"]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/job-ops
          tags: |
            type=ref,event=tag
            type=raw,value=main,enable={{is_default_branch}}
            type=sha
            # :latest only for version tags, never moved by branch builds
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
